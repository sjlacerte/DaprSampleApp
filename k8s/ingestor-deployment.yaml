apiVersion: v1
kind: ServiceAccount
metadata:
  name: dapr-iot-ingestor
  namespace: dapr-iot
  annotations:
    eks.amazonaws.com/role-arn: "${INGESTOR_ROLE_ARN}"  # replaced by deploy script
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dapr-iot-ingestor
  namespace: dapr-iot
  labels:
    app: dapr-iot-ingestor
    project: dapr-iot-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dapr-iot-ingestor
  template:
    metadata:
      labels:
        app: dapr-iot-ingestor
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "dapr-iot-ingestor"
        dapr.io/app-port: "8080"
        dapr.io/app-protocol: "http"
        dapr.io/log-level: "info"
    spec:
      serviceAccountName: dapr-iot-ingestor
      containers:
        - name: ingestor
          image: "${INGESTOR_IMAGE}"  # replaced by deploy script
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: dapr-iot-ingestor
  namespace: dapr-iot
spec:
  selector:
    app: dapr-iot-ingestor
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer  # intentionally public — IoT devices POST sensor readings directly to this endpoint

apiVersion: v1
kind: ServiceAccount
metadata:
  name: dapr-iot-processor
  namespace: dapr-iot
  annotations:
    eks.amazonaws.com/role-arn: "${PROCESSOR_ROLE_ARN}"  # replaced by deploy script
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dapr-iot-processor
  namespace: dapr-iot
  labels:
    app: dapr-iot-processor
    project: dapr-iot-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dapr-iot-processor
  template:
    metadata:
      labels:
        app: dapr-iot-processor
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "dapr-iot-processor"
        dapr.io/app-port: "8080"
        dapr.io/app-protocol: "http"
        dapr.io/log-level: "info"
        dapr.io/wait-max-seconds: "30"
    spec:
      serviceAccountName: dapr-iot-processor
      containers:
        - name: processor
          image: "${PROCESSOR_IMAGE}"  # replaced by deploy script
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: dapr-iot-processor
  namespace: dapr-iot
spec:
  selector:
    app: dapr-iot-processor
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP

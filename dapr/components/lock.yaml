apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: lockstore
  namespace: dapr-iot
auth:
  secretStore: kubernetes       # resolves secretKeyRef from K8s secrets
spec:
  type: lock.redis
  version: v1
  metadata:
    - name: redisHost
      secretKeyRef:
        name: dapr-iot-redis-host
        key: host               # K8s secret populated by Terraform output
    - name: redisPassword
      value: ""                 # ElastiCache deployed without auth; IRSA handles AWS-level access
    - name: enableTLS
      value: "false"
